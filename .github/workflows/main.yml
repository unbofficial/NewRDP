name: RDP-Persistent-Final-V8

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: 1. Restore Browser Session
        uses: actions/cache@v3
        with:
          path: C:\BrowserData
          key: chrome-data-v1
          restore-keys: |
            chrome-data-

      - name: 2. Setup User and Permissions
        shell: pwsh
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0 -Force
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          
          $user = "${{ secrets.RDP_USERNAME }}"
          $pass = "${{ secrets.USER_PASSWORD }}"
          $secstr = ConvertTo-SecureString $pass -AsPlainText -Force
          New-LocalUser -Name $user -Password $secstr -AccountNeverExpires -ErrorAction SilentlyContinue
          Add-LocalGroupMember -Group "Administrators" -Member $user -ErrorAction SilentlyContinue
          
          # Root Folder Setup
          if (!(Test-Path "C:\BrowserData")) { New-Item -Path "C:\BrowserData" -ItemType Directory -Force }
          
          # Permissions: Is baar hum 'Everyone' ko full malik bana rahe hain
          icacls "C:\BrowserData" /grant "Everyone:(OI)(CI)F" /T /C
          attrib -r "C:\BrowserData\*.*" /s /d

      - name: 3. Create Shortcuts (New Logic)
        shell: pwsh
        run: |
          $publicDesktop = "C:\Users\Public\Desktop"
          
          # Chrome Launcher (Is baar Chrome ko majboor karenge login save karne par)
          $chromeCmd = "@echo off`nstart chrome --user-data-dir='C:\BrowserData' --no-sandbox --disable-setuid-sandbox --no-first-run --disable-gpu --remote-debugging-port=9222"
          $chromeCmd | Out-File "$publicDesktop\Open_Chrome.bat" -Encoding ascii
          
          # EXIT & SAVE: Is baar hum ek simple command use karenge jo workflow ko signal dega
          $stopCmd = "@echo off`necho Saving and Closing...`npowershell -Command `"New-Item -Path 'C:\exit_signal.txt' -ItemType File -Force`"`nexit"
          $stopCmd | Out-File "$publicDesktop\SAVE_AND_EXIT.bat" -Encoding ascii

      - name: 4. Start Ngrok
        shell: pwsh
        run: |
          choco install ngrok -y
          ngrok config add-authtoken "${{ secrets.NGROK_AUTH_TOKEN }}"
          Start-Process ngrok -ArgumentList "tcp 127.0.0.1:3389 --region ap"
          Start-Sleep -Seconds 20

      - name: 5. Connection Info
        shell: pwsh
        run: |
          $response = Invoke-RestMethod -Uri http://localhost:4040/api/tunnels
          $address = $response.tunnels.public_url.Replace("tcp://", "")
          Write-Host "ADDRESS  : $address"
          Write-Host "USERNAME : .\${{ secrets.RDP_USERNAME }}"

      - name: 6. Wait for Exit Signal (Reliable)
        shell: pwsh
        run: |
          Write-Host "RDP Active. Double-click SAVE_AND_EXIT on desktop to FINISH."
          # Loop tab tak chalega jab tak 'C:\exit_signal.txt' file nahi banti
          while (!(Test-Path "C:\exit_signal.txt")) {
            Start-Sleep -Seconds 5
          }
          Write-Host "✅ Exit Signal Received. Saving data and finishing workflow..."
