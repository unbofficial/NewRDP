name: RDP-Persistent-Final-V10

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: 1. Restore Browser Session
        uses: actions/cache@v3
        with:
          path: C:\BrowserData
          key: edge-session-v1
          restore-keys: |
            edge-session-

      - name: 2. Setup User and Permissions
        shell: pwsh
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0 -Force
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          
          $user = "${{ secrets.RDP_USERNAME }}"
          $pass = "${{ secrets.USER_PASSWORD }}"
          $secstr = ConvertTo-SecureString $pass -AsPlainText -Force
          New-LocalUser -Name $user -Password $secstr -AccountNeverExpires -ErrorAction SilentlyContinue
          Add-LocalGroupMember -Group "Administrators" -Member $user -ErrorAction SilentlyContinue
          
          # Browser Data Folder setup
          if (!(Test-Path "C:\BrowserData")) { New-Item -Path "C:\BrowserData" -ItemType Directory -Force }
          icacls "C:\BrowserData" /grant "Everyone:(OI)(CI)F" /T /C

      - name: 3. Create Shortcuts (Edge Version)
        shell: pwsh
        run: |
          $publicDesktop = "C:\Users\Public\Desktop"
          
          # Microsoft Edge Launcher (Chrome ka bhai, no permission issues)
          $edgeCmd = "@echo off`nstart msedge --user-data-dir='C:\BrowserData' --no-first-run --no-default-browser-check"
          $edgeCmd | Out-File "$publicDesktop\Open_Browser.bat" -Encoding ascii
          
          # EXIT & SAVE Signal
          $stopCmd = "@echo off`necho Saving and Closing...`npowershell -Command `"New-Item -Path 'C:\exit_signal.txt' -ItemType File -Force`"`nexit"
          $stopCmd | Out-File "$publicDesktop\SAVE_AND_EXIT.bat" -Encoding ascii

      - name: 4. Start Ngrok (Asia)
        shell: pwsh
        run: |
          choco install ngrok -y
          ngrok config add-authtoken "${{ secrets.NGROK_AUTH_TOKEN }}"
          Start-Process ngrok -ArgumentList "tcp 127.0.0.1:3389 --region ap"
          Start-Sleep -Seconds 20

      - name: 5. Connection Info
        shell: pwsh
        run: |
          $response = Invoke-RestMethod -Uri http://localhost:4040/api/tunnels
          $address = $response.tunnels.public_url.Replace("tcp://", "")
          Write-Host "ADDRESS  : $address"
          Write-Host "USERNAME : .\${{ secrets.RDP_USERNAME }}"

      - name: 6. Wait for Exit Signal
        shell: pwsh
        run: |
          Write-Host "RDP Active. Double-click SAVE_AND_EXIT to finish."
          # Loop checking for file signal
          while (!(Test-Path "C:\exit_signal.txt")) {
            Start-Sleep -Seconds 5
          }
          Write-Host "✅ Exit Signal Received. Saving data..."
