name: RDP-Persistent-Final-Fixed

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: 1. Restore Browser Session
        uses: actions/cache@v3
        with:
          path: C:\BrowserProfile
          key: browser-session-${{ github.run_id }}
          restore-keys: |
            browser-session-

      - name: 2. Setup Windows & User
        shell: pwsh
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
          $user = "${{ secrets.RDP_USERNAME }}"
          $pass = "${{ secrets.USER_PASSWORD }}"
          $secstr = ConvertTo-SecureString $pass -AsPlainText -Force
          
          # Create User
          New-LocalUser -Name $user -Password $secstr -AccountNeverExpires -ErrorAction SilentlyContinue
          Add-LocalGroupMember -Group "Administrators" -Member $user -ErrorAction SilentlyContinue
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          
          if (!(Test-Path "C:\BrowserProfile")) { New-Item -Path "C:\BrowserProfile" -ItemType Directory -Force }
          "run" | Out-File "C:\stop_signal.txt" -Force

      - name: 3. Create Shortcuts (Fixed Method)
        shell: pwsh
        run: |
          $user = "${{ secrets.RDP_USERNAME }}"
          
          # Script content
          $chromeCmd = "start chrome --user-data-dir='C:\BrowserProfile' --no-first-run"
          $stopCmd = "echo 'Saving and Closing...' && del C:\stop_signal.txt"

          # Save to C: first (Safe zone)
          $chromeCmd | Out-File "C:\Open_Chrome.bat" -Force
          $stopCmd | Out-File "C:\SAVE_AND_EXIT.bat" -Force

          # Copy to Public Desktop so it's visible to any user who logs in
          $publicDesktop = "C:\Users\Public\Desktop"
          Copy-Item "C:\Open_Chrome.bat" -Destination $publicDesktop -Force
          Copy-Item "C:\SAVE_AND_EXIT.bat" -Destination $publicDesktop -Force
          
          Write-Host "✅ Shortcuts created on Public Desktop"

      - name: 4. Start Ngrok
        shell: pwsh
        run: |
          choco install ngrok -y
          ngrok config add-authtoken "${{ secrets.NGROK_AUTH_TOKEN }}"
          Start-Process ngrok -ArgumentList "tcp 127.0.0.1:3389 --region us"
          Start-Sleep -Seconds 20

      - name: 5. Connection Info
        shell: pwsh
        run: |
          $response = Invoke-RestMethod -Uri http://localhost:4040/api/tunnels
          $address = $response.tunnels.public_url.Replace("tcp://", "")
          Write-Host "=========================================="
          Write-Host "ADDRESS  : $address"
          Write-Host "USERNAME : .\${{ secrets.RDP_USERNAME }}"
          Write-Host "PASSWORD : ${{ secrets.USER_PASSWORD }}"
          Write-Host "=========================================="

      - name: 6. Wait for "Save & Exit" Click
        shell: pwsh
        run: |
          Write-Host "RDP is active. Double-click 'SAVE_AND_EXIT' on Desktop to finish."
          while(Test-Path "C:\stop_signal.txt") {
            Start-Sleep -Seconds 10
          }
          Write-Host "✅ Exit signal received. Saving session to GitHub Cache..."
