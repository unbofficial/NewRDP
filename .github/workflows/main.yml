name: RDP-Persistent-Final-V5

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: 1. Restore Browser Session
        uses: actions/cache@v3
        with:
          path: C:\Users\runneradmin\Documents\BrowserProfile
          key: chrome-data-${{ github.run_id }}
          restore-keys: |
            chrome-data-

      - name: 2. Setup User & Permissions
        shell: pwsh
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
          $user = "${{ secrets.RDP_USERNAME }}"
          $pass = "${{ secrets.USER_PASSWORD }}"
          $secstr = ConvertTo-SecureString $pass -AsPlainText -Force
          New-LocalUser -Name $user -Password $secstr -AccountNeverExpires -ErrorAction SilentlyContinue
          Add-LocalGroupMember -Group "Administrators" -Member $user -ErrorAction SilentlyContinue
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          
          # Naya Safe Path: Documents ke andar
          $profilePath = "C:\Users\runneradmin\Documents\BrowserProfile"
          if (!(Test-Path $profilePath)) { New-Item -Path $profilePath -ItemType Directory -Force }
          
          # Permissions Full Control dena taaki Chrome nakhre na kare
          icacls $profilePath /grant "Everyone:(OI)(CI)F" /T

      - name: 3. Create Shortcuts (New Command)
        shell: pwsh
        run: |
          $publicDesktop = "C:\Users\Public\Desktop"
          $profilePath = "C:\Users\runneradmin\Documents\BrowserProfile"
          
          # Chrome command with NO-SANDBOX and DISABLED-SECURITY
          $chromeCmd = "@echo off`nstart chrome --user-data-dir='$profilePath' --no-sandbox --disable-setuid-sandbox --no-first-run"
          $chromeCmd | Out-File "$publicDesktop\Open_Chrome.bat" -Encoding ascii
          
          # Save and Exit command
          "@echo off`necho Saving and Closing...`nstart calc.exe`nexit" | Out-File "$publicDesktop\SAVE_AND_EXIT.bat" -Encoding ascii

      - name: 4. Start Ngrok (Asia)
        shell: pwsh
        run: |
          choco install ngrok -y
          ngrok config add-authtoken "${{ secrets.NGROK_AUTH_TOKEN }}"
          Start-Process ngrok -ArgumentList "tcp 127.0.0.1:3389 --region ap"
          Start-Sleep -Seconds 20

      - name: 5. Connection Info
        shell: pwsh
        run: |
          $response = Invoke-RestMethod -Uri http://localhost:4040/api/tunnels
          $address = $response.tunnels.public_url.Replace("tcp://", "")
          Write-Host "ADDRESS  : $address"
          Write-Host "USER     : .\${{ secrets.RDP_USERNAME }}"
          Write-Host "PASS     : ${{ secrets.USER_PASSWORD }}"

      - name: 6. Wait for Exit Signal
        shell: pwsh
        run: |
          Write-Host "RDP Active. Double-click SAVE_AND_EXIT on desktop to FINISH and SAVE."
          while ($true) {
            if (Get-Process -Name "calc" -ErrorAction SilentlyContinue) {
              Write-Host "✅ Signal Received. Shutting down..."
              Stop-Process -Name "calc" -Force
              break
            }
            Start-Sleep -Seconds 10
          }
