name: RDP-Persistent-Final-V3

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: 1. Restore Browser Session
        uses: actions/cache@v3
        with:
          path: C:\BrowserProfile
          key: browser-session-${{ github.run_id }}
          restore-keys: |
            browser-session-

      - name: 2. Setup Windows & User
        shell: pwsh
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
          $user = "${{ secrets.RDP_USERNAME }}"
          $pass = "${{ secrets.USER_PASSWORD }}"
          $secstr = ConvertTo-SecureString $pass -AsPlainText -Force
          
          # User creation
          New-LocalUser -Name $user -Password $secstr -AccountNeverExpires -ErrorAction SilentlyContinue
          Add-LocalGroupMember -Group "Administrators" -Member $user -ErrorAction SilentlyContinue
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          
          if (!(Test-Path "C:\BrowserProfile")) { New-Item -Path "C:\BrowserProfile" -ItemType Directory -Force }

      - name: 3. Create Desktop Shortcuts
        shell: pwsh
        run: |
          $user = "${{ secrets.RDP_USERNAME }}"
          $desktopPath = "C:\Users\$user\Desktop"
          
          # 1. Chrome Shortcut with Profile
          $chromeAction = "start chrome --user-data-dir='C:\BrowserProfile'"
          $chromeAction | Out-File "$desktopPath\Open_Chrome.bat"

          # 2. SAVE & STOP Shortcut
          $stopAction = "echo Stopping... && del C:\stop_signal.txt"
          $stopAction | Out-File "$desktopPath\SAVE_AND_EXIT.bat"
          
          # Signal file create karna
          "run" | Out-File "C:\stop_signal.txt"

      - name: 4. Start Ngrok
        shell: pwsh
        run: |
          choco install ngrok -y
          ngrok config add-authtoken "${{ secrets.NGROK_AUTH_TOKEN }}"
          Start-Process ngrok -ArgumentList "tcp 127.0.0.1:3389 --region us"
          Start-Sleep -Seconds 20

      - name: 5. Connection Info
        shell: pwsh
        run: |
          $response = Invoke-RestMethod -Uri http://localhost:4040/api/tunnels
          $address = $response.tunnels.public_url.Replace("tcp://", "")
          Write-Host "ADDRESS  : $address"
          Write-Host "USERNAME : .\${{ secrets.RDP_USERNAME }}"
          Write-Host "PASSWORD : ${{ secrets.USER_PASSWORD }}"

      - name: 6. Wait for "Save & Exit" Click
        shell: pwsh
        run: |
          Write-Host "RDP is active. Double-click 'SAVE_AND_EXIT' on Desktop to finish."
          while(Test-Path "C:\stop_signal.txt") {
            Start-Sleep -Seconds 10
          }
          Write-Host "Exit signal received. Saving data..."
